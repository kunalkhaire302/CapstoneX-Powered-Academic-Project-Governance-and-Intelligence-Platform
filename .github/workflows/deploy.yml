name: Deploy Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
      - name: Smoke test
        run: |
          sleep 30
          curl --fail ${{ secrets.BACKEND_URL }}/api/health || exit 1

  deploy-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AI }}"
      - name: Smoke test
        run: |
          sleep 30
          curl --fail ${{ secrets.AI_SERVICE_URL }}/api/ai/health || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-ai-service]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy-frontend.result == 'success' && needs.deploy-backend.result == 'success'
        run: echo "✅ All deployments successful"
      - name: Notify on failure
        if: contains(needs.*.result, 'failure')
        run: echo "❌ Deployment failed — check logs"
