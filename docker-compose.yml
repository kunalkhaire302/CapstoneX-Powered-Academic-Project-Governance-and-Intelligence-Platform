version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: capstonex-db
    environment:
      POSTGRES_DB: capstonex_db
      POSTGRES_USER: capstonex
      POSTGRES_PASSWORD: capstonex_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstonex -d capstonex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional — AI service degrades gracefully without it)
  redis:
    image: redis:7-alpine
    container_name: capstonex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: capstonex-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@capstonex.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Backend API (Express.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstonex-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: capstonex_db
      DB_USER: capstonex
      DB_PASS: capstonex_pass
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8000
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET:-dev-ai-secret-change-me}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules

  # AI/ML Service (FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: capstonex-ai
    environment:
      BACKEND_URL: http://backend:5000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://capstonex:capstonex_pass@postgres:5432/capstonex_db
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET:-dev-ai-secret-change-me}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-fallback}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      SHAP_ENABLED: ${SHAP_ENABLED:-true}
      MODEL_REGISTRY_ENABLED: ${MODEL_REGISTRY_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/data:/app/data
      - ai_models:/app/app/ml/models

  # Frontend (Next.js) — Dev mode
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capstonex-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_AI_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  ai_models:
